services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ai_dashboard
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/ai_dashboard
      GROQ_API_KEY: ${GROQ_API_KEY}
      FLASK_SECRET_KEY: ${FLASK_SECRET_KEY:-change-me-in-production}
    ports:
      - "5000:5000"
    depends_on:
      - db

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  pgdata:
